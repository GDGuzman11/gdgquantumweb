<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDG Quantum Inc.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 🔬 Background Canvas -->
    <canvas id="neuralCanvas"></canvas>

    <!-- 🚀 Hero Section -->
    <div class="hero">
      <div class="typing-line"><span class="typed-line1"></span></div>
      <div class="typing-line"><span class="typed-line2"></span></div>
      <div class="typing-line">
        <span class="typed-line3"></span><span class="cursor">|</span>
      </div>

      <!-- CTA Button (initially hidden) -->
      <a href="landing.html" class="cta-button" id="enterBtn">Launch What Should Exist</a>
    </div>

    <!-- ✍️ Typing Script -->
    <script>
      const lines = [
        "i'm Gabe,",
        "and welcome to",
        "GDG Quantum Inc."
      ];

      const spans = [
        document.querySelector(".typed-line1"),
        document.querySelector(".typed-line2"),
        document.querySelector(".typed-line3")
      ];

      const cursor = document.querySelector(".cursor");
      const enterBtn = document.getElementById("enterBtn");

      let currentLine = 0;
      let charIndex = 0;
      const typingDelay = 100;

      function type() {
        if (charIndex < lines[currentLine].length) {
          spans[currentLine].textContent += lines[currentLine].charAt(charIndex);
          charIndex++;
          setTimeout(type, typingDelay);
        } else {
          if (currentLine === lines.length - 1) {
            cursor.style.display = "inline-block";
            enterBtn.classList.add("visible");
          }

          currentLine++;
          charIndex = 0;

          if (currentLine < lines.length) {
            setTimeout(type, 500);
          }
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        setTimeout(type, 500);
      });
    </script>

    <!-- 🧠 Neuron Background Script -->
    <script type="module">
      import { initNeuralCanvas } from './neuralCanvas.js';
      window.addEventListener('DOMContentLoaded', initNeuralCanvas);
    </script>
  </body>
</html>
